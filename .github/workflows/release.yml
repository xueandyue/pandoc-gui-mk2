name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, for example v2.1.1"
        required: true
      release_name:
        description: "Optional custom release title"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      release_name: ${{ steps.meta.outputs.release_name }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Resolve tag and validate versions
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            CUSTOM_RELEASE_NAME="${{ github.event.inputs.release_name }}"
          else
            TAG="${GITHUB_REF_NAME}"
            CUSTOM_RELEASE_NAME=""
          fi

          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must match vX.Y.Z, got: $TAG"
            exit 1
          fi

          VERSION="${TAG#v}"

          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          TAURI_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          CARGO_VERSION=$(grep -m1 '^version = ' src-tauri/Cargo.toml | sed -E 's/version = \"([^\"]+)\"/\1/')

          if [ "$PACKAGE_VERSION" != "$VERSION" ] || [ "$TAURI_VERSION" != "$VERSION" ] || [ "$CARGO_VERSION" != "$VERSION" ]; then
            echo "Version mismatch detected."
            echo "Tag version:    $VERSION"
            echo "package.json:   $PACKAGE_VERSION"
            echo "tauri.conf.json:$TAURI_VERSION"
            echo "Cargo.toml:     $CARGO_VERSION"
            exit 1
          fi

          if [ -n "$CUSTOM_RELEASE_NAME" ]; then
            RELEASE_NAME="$CUSTOM_RELEASE_NAME"
          else
            RELEASE_NAME="Pandoc GUI v$VERSION"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_name=$RELEASE_NAME" >> "$GITHUB_OUTPUT"

  build-and-release:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: "--target aarch64-apple-darwin"
            name: macOS-aarch64
            pandoc_asset_pattern: "pandoc-*-arm64-macOS.zip"
            pandoc_resource_subdir: "macos-aarch64"
            pandoc_binary_name: "pandoc"
          - platform: macos-latest
            target: x86_64-apple-darwin
            args: "--target x86_64-apple-darwin"
            name: macOS-x64
            pandoc_asset_pattern: "pandoc-*-x86_64-macOS.zip"
            pandoc_resource_subdir: "macos-x64"
            pandoc_binary_name: "pandoc"
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: "--target x86_64-unknown-linux-gnu"
            name: Linux-x64
            pandoc_asset_pattern: "pandoc-*-linux-amd64.tar.gz"
            pandoc_resource_subdir: "linux-x64"
            pandoc_binary_name: "pandoc"
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: "--target x86_64-pc-windows-msvc"
            name: Windows-x64
            pandoc_asset_pattern: "pandoc-*-windows-x86_64.zip"
            pandoc_resource_subdir: "windows-x64"
            pandoc_binary_name: "pandoc.exe"
            tectonic_asset_pattern: "tectonic-*-x86_64-pc-windows-msvc.zip"
            tectonic_resource_subdir: "windows-x64"
            tectonic_binary_name: "tectonic.exe"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Install frontend dependencies
        run: npm ci

      - name: Prepare bundled Pandoc
        shell: pwsh
        run: >
          ./scripts/prepare-bundled-pandoc.ps1
          -AssetPattern "${{ matrix.pandoc_asset_pattern }}"
          -ResourceSubdir "${{ matrix.pandoc_resource_subdir }}"
          -BinaryName "${{ matrix.pandoc_binary_name }}"

      - name: Prepare bundled Tectonic
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: >
          ./scripts/prepare-bundled-tectonic.ps1
          -AssetPattern "${{ matrix.tectonic_asset_pattern }}"
          -ResourceSubdir "${{ matrix.tectonic_resource_subdir }}"
          -BinaryName "${{ matrix.tectonic_binary_name }}"

      - name: Build bundles and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: ${{ needs.prepare.outputs.release_name }}
          releaseBody: |
            See the [CHANGELOG](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for details.

            ## Downloads

            | Platform | Architecture | File |
            |----------|--------------|------|
            | macOS | Apple Silicon (M1/M2/M3) | `.dmg` (aarch64) |
            | macOS | Intel | `.dmg` (x64) |
            | Windows | x64 | `.msi` or `.exe` |
            | Linux | x64 | `.deb`, `.AppImage`, or `.rpm` |
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
